name: Build Resource Pack
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: cd pack && zip -r ../pack.zip assets/ Pack.mcmeta
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add pack.zip
          git commit -m "Auto-build pack.zip [skip ci]" || echo "No changes"
          git push